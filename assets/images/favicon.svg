<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="url(#bg)"/>

  <!-- Gradient definitions -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2e7d32"/>
      <stop offset="100%" stop-color="#66bb6a"/>
    </linearGradient>
    <linearGradient id="mango" x1="20" y1="14" x2="44" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffe082"/>
      <stop offset="60%" stop-color="#ff8f00"/>
      <stop offset="100%" stop-color="#e65100"/>
    </linearGradient>
  </defs>

  <!-- Mango body -->
  <ellipse cx="32" cy="36" rx="14" ry="18" fill="url(#mango)" transform="rotate(-10 32 36)"/>

  <!-- Mango highlight -->
  <ellipse cx="27" cy="30" rx="4" ry="6" fill="#fff9c4" opacity="0.35" transform="rotate(-10 27 30)"/>

  <!-- Stem -->
  <path d="M32 18 Q34 10 40 8" stroke="#4caf50" stroke-width="2.5" stroke-linecap="round" fill="none"/>

  <!-- Leaf -->
  <ellipse cx="40" cy="9" rx="5" ry="2.5" fill="#43a047" transform="rotate(-30 40 9)"/>
  <line x1="38" y1="10" x2="42" y2="8" stroke="#2e7d32" stroke-width="0.8"/>
</svg>
