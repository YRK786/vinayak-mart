<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products | Vinayak Fruit &amp; Vegetable Mart</title>
  <meta name="description" content="Shop fresh fruits and vegetables online at Vinayak Mart. Filter by category, price and rating. Best prices on Kesar Mango, Banana, Potato, Onion and more.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="assets/css/style.css" rel="stylesheet">
</head>
<body>

  <div id="vk-header"></div>

  <!-- ============ PAGE HERO ============ -->
  <section class="page-hero">
    <div class="container">
      <h1>Our Products</h1>
      <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
          <li class="breadcrumb-item"><a href="index.html">Home</a></li>
          <li class="breadcrumb-item active" aria-current="page">Products</li>
        </ol>
      </nav>
    </div>
  </section>

  <!-- ============ PRODUCTS + FILTERS ============ -->
  <section class="section">
    <div class="container">
      <div class="row g-4">

        <!-- Sidebar filters -->
        <aside class="col-lg-3">
          <!-- Mobile filter toggle -->
          <button class="btn btn-vk-outline w-100 d-lg-none mb-3" type="button" data-bs-toggle="collapse" data-bs-target="#filterPanel">
            <i class="bi bi-funnel"></i> Filters
          </button>

          <div class="collapse d-lg-block" id="filterPanel">
            <div class="filter-panel">
              <!-- Search -->
              <div class="filter-group">
                <h6>Search</h6>
                <div class="header-search">
                  <input type="search" id="filterSearch" class="form-control" placeholder="Search products...">
                  <button type="button" aria-label="Search"><i class="bi bi-search"></i></button>
                </div>
              </div>

              <!-- Category filter -->
              <div class="filter-group">
                <h6>Category</h6>
                <div id="categoryFilters"></div>
              </div>

              <!-- Price filter -->
              <div class="filter-group">
                <h6>Max Price</h6>
                <input type="range" class="form-range" id="priceRange" min="10" max="200" step="10" value="200">
                <div class="d-flex justify-content-between small text-muted">
                  <span>₹10</span><span>Up to <strong id="priceValue" class="text-green">₹200</strong></span>
                </div>
              </div>

              <!-- Rating filter -->
              <div class="filter-group">
                <h6>Rating</h6>
                <div class="form-check">
                  <input class="form-check-input" type="radio" name="ratingFilter" value="0" id="ratingAll" checked>
                  <label class="form-check-label" for="ratingAll">All ratings</label>
                </div>
                <div class="form-check">
                  <input class="form-check-input" type="radio" name="ratingFilter" value="4" id="rating4">
                  <label class="form-check-label" for="rating4">4 stars &amp; up</label>
                </div>
                <div class="form-check">
                  <input class="form-check-input" type="radio" name="ratingFilter" value="5" id="rating5">
                  <label class="form-check-label" for="rating5">5 stars only</label>
                </div>
              </div>

              <button class="btn btn-vk-outline w-100" id="resetFilters"><i class="bi bi-arrow-counterclockwise"></i> Reset Filters</button>
            </div>
          </div>
        </aside>

        <!-- Product grid -->
        <div class="col-lg-9">
          <div class="d-flex flex-wrap justify-content-between align-items-center mb-4 gap-2">
            <p class="mb-0 text-muted"><span id="resultCount">0</span> products found</p>
            <select class="form-select w-auto" id="sortSelect">
              <option value="default">Sort by: Featured</option>
              <option value="price-low">Price: Low to High</option>
              <option value="price-high">Price: High to Low</option>
              <option value="rating">Top Rated</option>
              <option value="name">Name: A to Z</option>
            </select>
          </div>
          <div class="row g-3 g-md-4" id="productGrid"></div>
        </div>

      </div>
    </div>
  </section>

  <div id="vk-footer"></div>
  <div id="vk-floating"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/data.js"></script>
  <script src="assets/js/main.js"></script>
  <script src="assets/js/components.js"></script>
  <script>
    // ----- Products page filtering logic -----
    document.addEventListener("DOMContentLoaded", function () {
      const state = { category: "all", maxPrice: 200, rating: 0, search: "", sort: "default" };

      // Read URL params (category / search) for deep linking
      const params = new URLSearchParams(location.search);
      if (params.get("category")) state.category = params.get("category");
      if (params.get("search")) state.search = params.get("search");

      // Build category radio filters
      const catWrap = document.getElementById("categoryFilters");
      const cats = [{ id: "all", name: "All Categories" }].concat(VK_CATEGORIES);
      catWrap.innerHTML = cats
        .map(
          (c) => `
        <div class="form-check">
          <input class="form-check-input" type="radio" name="catFilter" value="${c.id}" id="cat-${c.id}" ${c.id === state.category ? "checked" : ""}>
          <label class="form-check-label" for="cat-${c.id}">${c.name}</label>
        </div>`
        )
        .join("");

      const searchInput = document.getElementById("filterSearch");
      searchInput.value = state.search;

      function apply() {
        let list = VK_PRODUCTS.filter((p) => {
          if (state.category !== "all" && p.categoryId !== state.category) return false;
          if (p.price > state.maxPrice) return false;
          if (state.rating && p.rating < state.rating) return false;
          if (state.search) {
            const q = state.search.toLowerCase();
            if (!p.name.toLowerCase().includes(q) && !p.category.toLowerCase().includes(q)) return false;
          }
          return true;
        });

        switch (state.sort) {
          case "price-low": list.sort((a, b) => a.price - b.price); break;
          case "price-high": list.sort((a, b) => b.price - a.price); break;
          case "rating": list.sort((a, b) => b.rating - a.rating); break;
          case "name": list.sort((a, b) => a.name.localeCompare(b.name)); break;
        }

        document.getElementById("resultCount").textContent = list.length;
        VK.renderProducts("productGrid", list, "col-6 col-md-4");
      }

      // Listeners
      catWrap.addEventListener("change", (e) => { state.category = e.target.value; apply(); });
      document.getElementById("priceRange").addEventListener("input", (e) => {
        state.maxPrice = +e.target.value;
        document.getElementById("priceValue").textContent = "₹" + e.target.value;
        apply();
      });
      document.querySelectorAll('input[name="ratingFilter"]').forEach((r) =>
        r.addEventListener("change", (e) => { state.rating = +e.target.value; apply(); })
      );
      searchInput.addEventListener("input", (e) => { state.search = e.target.value; apply(); });
      document.getElementById("sortSelect").addEventListener("change", (e) => { state.sort = e.target.value; apply(); });
      document.getElementById("resetFilters").addEventListener("click", () => {
        state.category = "all"; state.maxPrice = 200; state.rating = 0; state.search = ""; state.sort = "default";
        document.getElementById("cat-all").checked = true;
        document.getElementById("priceRange").value = 200;
        document.getElementById("priceValue").textContent = "₹200";
        document.getElementById("ratingAll").checked = true;
        searchInput.value = "";
        document.getElementById("sortSelect").value = "default";
        apply();
      });

      apply();
    });
  </script>
</body>
</html>
