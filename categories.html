<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Categories | Vinayak Fruit &amp; Vegetable Mart</title>
  <meta name="description" content="Browse all categories of fresh fruits and vegetables at Vinayak Mart - Fruits, Vegetables, Kesar Mango, Banana, Potato, Onion, Tomato and Green Vegetables.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="assets/css/style.css" rel="stylesheet">
</head>
<body>

  <div id="vk-header"></div>

  <!-- ============ PAGE HERO ============ -->
  <section class="page-hero">
    <div class="container">
      <h1>Shop by Category</h1>
      <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
          <li class="breadcrumb-item"><a href="index.html">Home</a></li>
          <li class="breadcrumb-item active" aria-current="page">Categories</li>
        </ol>
      </nav>
    </div>
  </section>

  <!-- ============ CATEGORIES GRID ============ -->
  <section class="section">
    <div class="container">
      <div class="section-head text-center reveal">
        <span class="eyebrow">Explore</span>
        <h2>All Categories</h2>
        <p>Find exactly what you need from our fresh produce categories.</p>
      </div>
      <div class="row g-3 g-md-4" id="allCategories"></div>
    </div>
  </section>

  <!-- ============ CTA ============ -->
  <section class="section pt-0">
    <div class="container">
      <div class="promo-banner reveal text-center">
        <h2>Can't find what you're looking for?</h2>
        <p class="opacity-75">Message us on WhatsApp and we'll help you order any fresh item.</p>
        <a href="https://wa.me/919650067172" class="btn btn-light btn-lg mt-2" target="_blank" rel="noopener"><i class="bi bi-whatsapp"></i> Ask on WhatsApp</a>
      </div>
    </div>
  </section>

  <div id="vk-footer"></div>
  <div id="vk-floating"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/data.js"></script>
  <script src="assets/js/main.js"></script>
  <script src="assets/js/components.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      document.getElementById("allCategories").innerHTML =
        VK_CATEGORIES.map((c) => VK.categoryCard(c)).join("");
      VK.initReveal();
    });
  </script>
</body>
</html>
